<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Meet Jain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    
    <style>
        .resume-section {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the inner layout elements dynamically */
            gap: 1.5rem;
            padding-bottom: 6rem;
            width: 100%;
        }

        .resume-action-bar {
            display: flex;
            justify-content: center; /* Forces the text link into the exact horizontal center */
            width: 100%;
        }

        /* Styled as a clean, text-only minimal link */
        .resume-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
        }

        .resume-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }

        .resume-viewer-frame {
            width: 100%; 
            max-width: 100%; 
            height: 1000px; 
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .resume-viewer-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .resume-viewer-frame {
                height: 600px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-container">
            <a href="index.html" class="logo">MEET<span>.JAIN</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects/index.html">Projects</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="resume.html" class="active">Resume</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Resume</h1>
            <p class="page-intro">
                Review or download my technical CV summarizing my academic timeline, mixed-signal hardware layout experience, and low-level firmware engineering background.
            </p>
        </header>

        <section class="resume-section">
            
            <!-- Centered Text Link Interface Layout -->
            <div class="resume-action-bar">
                <a class="resume-link" href="assets/resume.pdf" download>
                    Download PDF Resume ↓
                </a>
            </div>

            <!-- Large Scale Expanded Document Preview Framework -->
            <div class="resume-viewer-frame">
                <iframe src="assets/resume.pdf#view=FitH&toolbar=0&navpanes=0"></iframe>
            </div>

        </section>
    </main>

</body>
</html>
